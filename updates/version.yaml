1.0.1: First version of EndangeredMap
1.0.2:
    - Create species table
    - create_species_table.php
1.0.3:
    - Create statuses table
    - create_statuses_table.php
1.0.4:
    - Create acronyms table
    - create_acronyms_table.php
1.0.5:
    - Status filter shows full names in specified order with merged categories
    - Taxon search now searches across genus, species, and family fields
    - Merged status categories (NE into NA, Included into Present, Threatened variants)
    - Added DD/LC color and legend support
    - Changed Near Threatened color to orange
    - Renamed page to National Red Lists in Europe
    - Fixed selectize dropdown arrow overlap with remove button
1.0.6:
    - Fix search suggestions disappearing due to race conditions (added debounce and request cancellation)
    - Fix "included" appearing as separate status in dropdown
    - Fix case-sensitive search and status filtering for PostgreSQL (ILIKE)
1.0.7:
    - Remove acronym codes from legend and map tooltips, show only full status names
